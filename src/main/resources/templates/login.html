<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>

</header>
<main>
    <article id="login">
        <h2>Logging page.</h2>
        <form th:action="@{/login}" th:object="${loginDTO}" method="post">
            <label for="email">Your email?</label>
            <input type="text" th:field="${loginDTO.email}" id="email" placeholder="JohnDoe@example.com">
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            <label for="password">Your password?</label>
            <input type="password" th:field="${loginDTO.password}" id="password">
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <!-- <button onclick="showPassword()">See password</button>-->
            <input type="submit" value="Login">
        </form>
        <a href="/register">Registering instead?</a>
    </article>
</main>
<footer>

</footer>
</body>
<script>
    function showPassword() {
        let x = document.getElementById("password");
        if (x.type === "password") {
            x.type = "text";
        } else {
            x.type = "password";
        }
    }
</script>
</html>
