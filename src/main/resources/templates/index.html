<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    *{
    padding: 0px;
    margin: 0px;
    }
    header{
        display: flex;
        background-color: darkblue;
        color: white;
        border-radius: 0px 0px 15px 15px;
        box-shadow: 0px 5px 5px black;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        span{
            font-size: 32px;
        }
        span:nth-child(3){
            text-decoration: underline;
        }
        a {
            color:white;
        }
        > nav {
          ul {
                list-style-type: none;
            }
        }
        img {
            padding: 30px;
        }
        li{
            padding: 5px;
        }
    }
.hidden{
    display:none;
}

main{
    margin: 25px auto auto auto;
    align-content: center;
    display: flex;
    flex-direction: column;
}
button{
    margin: auto;
    padding: 15px;
    color: blue;
}
main span{
   text-align: center;
   font-size: 36px;
}
.green{
    color: green;
}
.red{
    color: red;
}
footer{
    position: fixed;
    bottom: 0px;
}
</style>
<body>
<header>
    <article>
        <a href="/"><img src="/images/logo.png" alt="Logo"></a>
        <span id="welcomeMessage"></span>
        <span th:text="${user.firstName}">Example</span>
    </article>
    <nav>
        <ul>
            <li><a href="/transfer" th:href="@{/tranfer}">Give money to someone</a></li>
            <li><a href="/contact">Add a contact</a></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <input type="submit" value="Sign Out"/>
                </form>
            </li>
        </ul>
    </nav>
</header>
<main>
    <button onclick="viewAmount()" id="buttonAmount">View amount</button>
    <span class="hidden green" id="amount" th:text="${user.account.amount}">500.00€</span>

    <form th:action="@{/addiban}" method="post">
        <input type="number" th:value="${user.id}" name="accountId">
        <label>Iban?</label>
        <input type="text" name="iban">

        <button type="submit">Add money</button>
    </form>

    <form th:action="@{/transfer}" method="post">
        <input type="text" name="from">
        <label>Amount to transfer</label>
        <input type="number" placeholder="" name="amountBeforeTax">
        <label>To?</label>
        <input type="text" name="to">
        <button type="submit">Add money</button>
    </form>

    <form th:action="@{/addmoney}" method="post">
        <label for="amount">add amount?</label>
        <input type="number" placeholder="2" name="amount">
        <label for="accountId">To who?</label>
        <input type="number" id="accountId" name="accountId">
        <button type="submit">Add money</button>
    </form>
</main>
<footer>
<p>FLASH CASH 2026 PROJECT / INDEX.HTML</p>
</footer>
</body>
<script>
    function randomWelcomeMessage() {
        let randomWelcome = ["Welcome", "Hello", "Good day to you", "Hi"]
        const random = Math.floor(Math.random() * randomWelcome.length);
        document.getElementById("welcomeMessage").innerHTML += randomWelcome[random] + " ";
    }

    function viewAmount() {
        if (document.getElementById("amount").classList.contains('hidden') ) {
            document.getElementById("amount").classList.remove('hidden');
            document.getElementById("buttonAmount").innerHTML = "Hide amount";
        } else {
           document.getElementById("amount").classList.add('hidden');
            document.getElementById("buttonAmount").innerHTML = "View amount";
        }
    }

    randomWelcomeMessage()
</script>
</html>
